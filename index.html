<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SideX</title>
    <script>
      // MUST run before any VSCode module — sets globals they depend on
      // builtinExtensionsPath = 'vs/../../extensions' resolves relative to FILE_ROOT.
      // In dev: FILE_ROOT=/src/, path becomes /src/vs/../../extensions = /extensions/
      // In prod: FILE_ROOT=/src/, path becomes /src/vs/../../extensions = /extensions/
      // Tauri serves dist/ at root, so /extensions/ maps to dist/extensions/
      globalThis._VSCODE_FILE_ROOT = window.location.origin + '/src/';
      globalThis._VSCODE_NLS_MESSAGES = [];
      globalThis._VSCODE_NLS_LANGUAGE = 'en';
      globalThis.__SIDEX_TAURI__ = true;
      globalThis._VSCODE_PACKAGE_JSON = { version: '1.110.0', name: 'sidex' };
      globalThis._VSCODE_PRODUCT_JSON = {
        nameShort: 'SideX',
        nameLong: 'SideX',
        applicationName: 'sidex',
        dataFolderName: '.sidex',
        urlProtocol: 'sidex',
        version: '1.110.0',
        commit: '',
        date: new Date().toISOString(),
        quality: 'stable',
        reportIssueUrl: 'https://github.com/Razshy/sidexvs/issues/new',
        licenseName: 'MIT',
        licenseUrl: 'https://github.com/Razshy/sidexvs/blob/main/LICENSE',
        extensionsGallery: {
          serviceUrl: 'https://open-vsx.org/vscode/gallery',
          itemUrl: 'https://open-vsx.org/vscode/item',
          resourceUrlTemplate: 'https://open-vsx.org/vscode/unpkg/{publisher}/{name}/{version}/{path}',
          controlUrl: '',
          nlsBaseUrl: '',
          publisherUrl: '',
        },
        defaultChatAgent: {
          extensionId: '',
          chatExtensionId: '',
          provider: {
            default: { id: '', name: '' },
            enterprise: { id: '', name: '' },
          },
          providerScopes: [],
        },
      };
    </script>
    <script>
      // Proxy Open VSX requests through Tauri backend to bypass CORS (Origin: null in webview)
      (function() {
        const originalFetch = window.fetch;
        window.fetch = async function(input, init) {
          const url = typeof input === 'string'
            ? input
            : input instanceof URL
              ? input.href
              : (input instanceof Request ? input.url : '');

          if (url && (url.includes('open-vsx.org') || url.includes('openvsx.eclipsecontent.org'))) {
            try {
              var invoke = window.__TAURI_INTERNALS__?.invoke;
              if (invoke) {
                var method = (init && init.method) ? init.method : 'GET';
                var hdrs = {};
                if (init && init.headers) {
                  if (init.headers instanceof Headers) {
                    init.headers.forEach(function(v, k) { hdrs[k] = v; });
                  } else if (typeof init.headers === 'object') {
                    hdrs = Object.assign({}, init.headers);
                  }
                }
                var bodyStr = null;
                if (init && init.body) {
                  bodyStr = typeof init.body === 'string' ? init.body : JSON.stringify(init.body);
                }
                var text = await invoke('proxy_request', {
                  url: url,
                  method: method,
                  headers: hdrs,
                  body: bodyStr
                });
                var contentType = 'application/octet-stream';
                if (typeof text === 'string') {
                  try { JSON.parse(text); contentType = 'application/json'; } catch(e) {}
                }
                return new Response(text, {
                  status: 200,
                  headers: { 'Content-Type': contentType },
                });
              }
            } catch (e) {
              console.warn('[SideX] Proxy fetch failed, falling back:', e);
            }
          }

          return originalFetch.call(this, input, init);
        };
      })();
    </script>
    <script src="/builtin-extensions.js"></script>
    <script type="module" src="/src/main.ts" defer></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1e1e1e;
        color: #cccccc;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        font-size: 13px;
      }
    </style>
  </head>
  <body aria-label="">
  </body>
</html>
