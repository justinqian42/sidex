name = "sidex-marketplace-proxy"
main = "src/worker.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Upstream URLs. These are the sources the worker queries in parallel.
# They are variables (not secrets) so we can override them for testing.
[vars]
MS_UPSTREAM = "https://marketplace.visualstudio.com"
OPENVSX_UPSTREAM = "https://open-vsx.org"

# KV namespace used as a second-tier cache (edge cache -> KV -> upstream).
# Create with: wrangler kv:namespace create MARKETPLACE_CACHE
[[kv_namespaces]]
binding = "MARKETPLACE_CACHE"
id = "f3c1bd969a374f0c91dd0ea7c6b01e6d"
preview_id = "683912397fd5416ea35fa436e40c21c8"

[observability]
enabled = true

[placement]
mode = "smart"

# Pre-warm the top ~30 extension searches every 30 minutes so cold
# POPs always have fresh cache. Runs entirely on Cloudflare -- no
# impact on user machines.
[triggers]
crons = ["*/30 * * * *"]
